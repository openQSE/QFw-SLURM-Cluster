services:
  mysql:
    image: mariadb:10.11
    hostname: mysql
    container_name: mysql
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
      MYSQL_DATABASE: slurm_acct_db
      MYSQL_USER: slurm
      MYSQL_PASSWORD: password
    volumes:
      - var_lib_mysql:/var/lib/mysql
    networks:
      - slurm-network

  slurmdbd:
    image: ${IMAGE_NAME}:${IMAGE_TAG}
    build:
      context: .
      args:
        SLURM_TAG: ${SLURM_TAG}
    command: ["slurmdbd"]
    container_name: slurmdbd
    hostname: slurmdbd
    volumes:
      - etc_munge:/etc/munge
      - etc_slurm:/etc/slurm
      - var_log_slurm:/var/log/slurm
      - ${QFW_CONTAINER_BASE}:/workspace/qfw-container-base
    expose:
      - "6819"
    depends_on:
      - mysql
    networks:
      - slurm-network

  slurmctld:
    image: ${IMAGE_NAME}:${IMAGE_TAG}
    command: ["slurmctld"]
    container_name: slurmctld
    hostname: slurmctld
    volumes:
      - etc_munge:/etc/munge
      - etc_slurm:/etc/slurm
      - slurm_jobdir:/data
      - var_log_slurm:/var/log/slurm
      - ./shared-dir:/mnt
      - ${QFW_CONTAINER_BASE}:/workspace/qfw-container-base
    expose:
      - "6817"
    depends_on:
      - "slurmdbd"
    networks:
      - slurm-network

  slurmrestd:
    image: ${IMAGE_NAME}:${IMAGE_TAG}
    command: ["slurmrestd"]
    #command: ["TJNXXX"]
    container_name: slurmrestd
    hostname: slurmrestd
    volumes:
      - etc_munge:/etc/munge
      - etc_slurm:/etc/slurm
      - var_log_slurm:/var/log/slurm
      - slurm_jobdir:/data
      - ${QFW_CONTAINER_BASE}:/workspace/qfw-container-base
    expose:
      - "6820"
    ports:
      - "6820:6820"
    depends_on:
      - "slurmctld"
    networks:
      - slurm-network

  c1:
    image: ${IMAGE_NAME}:${IMAGE_TAG}
    command: ["slurmd"]
    #command: ["TJNXXX"]
    hostname: c1
    container_name: c1
    volumes:
      - etc_munge:/etc/munge
      - etc_slurm:/etc/slurm
      - slurm_jobdir:/data
      - var_log_slurm:/var/log/slurm
      - ./shared-dir:/mnt
      - ${QFW_CONTAINER_BASE}:/workspace/qfw-container-base
    expose:
      - "6818"
    depends_on:
      - "slurmctld"
    networks:
      - slurm-network
    cpus: 4        # <--- Add this line to restrict to 4 virtual CPUs

