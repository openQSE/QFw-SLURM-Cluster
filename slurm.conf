# slurm.conf
#
# See the slurm.conf man page for more information.
#
ClusterName=linux
ControlMachine=slurmctld
ControlAddr=slurmctld
#BackupController=
#BackupAddr=
#
SlurmUser=slurm
#SlurmdUser=root
SlurmctldPort=6817
SlurmdPort=6818
AuthType=auth/munge
AuthAltTypes=auth/jwt
AuthAltParameters=jwt_key=/etc/slurm/jwt.key
#JobCredentialPrivateKey=
#JobCredentialPublicCertificate=
StateSaveLocation=/var/lib/slurmd
SlurmdSpoolDir=/var/spool/slurmd
SwitchType=switch/none
MpiDefault=none
SlurmctldPidFile=/var/run/slurmd/slurmctld.pid
SlurmdPidFile=/var/run/slurmd/slurmd.pid
ProctrackType=proctrack/linuxproc
#PluginDir=
#CacheGroups=0
#FirstJobId=
ReturnToService=0
#MaxJobCount=
#PlugStackConfig=
#PropagatePrioProcess=
#PropagateResourceLimits=
#PropagateResourceLimitsExcept=
#Prolog=
#Epilog=
#SrunProlog=
#SrunEpilog=
#TaskProlog=
#TaskEpilog=
#TaskPlugin=
TaskPlugin=task/none
#TrackWCKey=no
#TreeWidth=50
#TmpFS=
#UsePAM=
#
# TIMERS
SlurmctldTimeout=300
SlurmdTimeout=300
InactiveLimit=0
MinJobAge=300
KillWait=30
Waittime=0
#
# SCHEDULING
SchedulerType=sched/backfill
#SchedulerAuth=
#SchedulerPort=
#SchedulerRootFilter=
# TJN: workaround
#SelectType=select/cons_res
#SelectTypeParameters=CR_CPU_Memory
#
SelectType=select/cons_tres
SelectTypeParameters=CR_CPU_Memory
FastSchedule=1
#PriorityType=priority/multifactor
#PriorityDecayHalfLife=14-0
#PriorityUsageResetPeriod=14-0
#PriorityWeightFairshare=100000
#PriorityWeightAge=1000
#PriorityWeightPartition=10000
#PriorityWeightJobSize=1000
#PriorityMaxAge=1-0
#
# LOGGING
SlurmctldDebug=3
SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdDebug=3
SlurmdLogFile=/var/log/slurm/slurmd.log
JobCompType=jobcomp/filetxt
JobCompLoc=/var/log/slurm/jobcomp.log
#
# ACCOUNTING
JobAcctGatherType=jobacct_gather/linux
JobAcctGatherFrequency=30
#
AccountingStorageType=accounting_storage/slurmdbd
AccountingStorageHost=slurmdbd
AccountingStoragePort=6819
#AccountingStorageLoc=slurm_acct_db
#AccountingStoragePass=
#AccountingStorageUser=
#
# Start interactive shell on first node with salloc
LaunchParameters=use_interactive_step
GresTypes=qpu
# COMPUTE NODES
#  CPU            Total number of logical CPUs (cores × threads per core).
#  RealMemory     Total memory (in MB).
#  Sockets        Number of CPU sockets.
#  CoresPerSocket Physical cores per socket.
#  ThreadsPerCore Hyperthreading enabled (n threads per core).
#  State=UNKNOWN  The state of the node (used during configuration).
NodeName=c1 CPUs=8 Sockets=1 CoresPerSocket=8 ThreadsPerCore=1 RealMemory=6000 State=UNKNOWN
NodeName=c2 CPUs=8 Sockets=1 CoresPerSocket=8 ThreadsPerCore=1 RealMemory=6000 State=UNKNOWN
NodeName=c3 CPUs=8 Sockets=1 CoresPerSocket=8 ThreadsPerCore=1 RealMemory=6000 State=UNKNOWN
NodeName=c4 CPUs=8 Sockets=1 CoresPerSocket=8 ThreadsPerCore=1 RealMemory=6000 State=UNKNOWN
NodeName=c5 Gres=qpu:1 Features=iqm,superconducting,q20 CPUs=8 Sockets=1 CoresPerSocket=8 ThreadsPerCore=1 RealMemory=6000 State=UNKNOWN
NodeName=c6 Gres=qpu:10 Features=iqm,superconducting,q20 CPUs=8 Sockets=1 CoresPerSocket=8 ThreadsPerCore=1 RealMemory=6000 State=UNKNOWN
NodeName=c7 Gres=qpu:1  Features=ibm,superconducting,q127 CPUs=8 Sockets=1 CoresPerSocket=8 ThreadsPerCore=1 RealMemory=6000 State=UNKNOWN
NodeName=c8 Gres=qpu:20 Features=ibm,superconducting,q127 CPUs=8 Sockets=1 CoresPerSocket=8 ThreadsPerCore=1 RealMemory=6000 State=UNKNOWN

#
# PARTITIONS
PartitionName=normal  Default=YES Nodes=c[1-4] Priority=50 DefMemPerCPU=200 Shared=NO MaxTime=5-00:00:00 DefaultTime=5-00:00:00 State=UP
PartitionName=quantum Default=NO  Nodes=c[5-8] Priority=50 DefMemPerCPU=200 Shared=NO MaxTime=5-00:00:00 DefaultTime=5-00:00:00 State=UP
